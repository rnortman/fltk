# cargo-deny policy. Supply-chain gate run by `make cargo-deny` (part of `make check`)
# across all four workspaces (root + tests/*), all sharing this single config.

[advisories]
# RustSec advisory database. Fail on any unfixed vulnerability or yanked crate.
version = 2
yanked = "deny"
# TODO(pyo3-upgrade): both are cleared only by upgrading pyo3 to >=0.29.0, which is a real
# API migration (fragile cross-cdylib internals), not a drop-in bump. Tracked in TODO.md.
# Remove these ignores once the migration lands.
ignore = [
    "RUSTSEC-2025-0020", # buffer overflow in PyString::from_object (fixed in pyo3 0.24.1)
    "RUSTSEC-2026-0177", # missing Sync bound on PyCFunction::new_closure (fixed in pyo3 0.29.0)
]

[licenses]
# Third-party deps must use one of these. First-party crates that are not published
# to a public registry are exempt via [licenses.private] below.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[licenses.private]
# Skip license enforcement for our own unpublished crates (publish = false):
# fltk-native (ships via PyPI/maturin), fltk-cst-spike, and the tests/* fixtures.
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
