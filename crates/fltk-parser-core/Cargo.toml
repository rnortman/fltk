[package]
name = "fltk-parser-core"
version = "0.2.0"
edition = "2021"

[lib]
name = "fltk_parser_core"
crate-type = ["rlib"]

# No `python` feature: pyo3-freedom is structural absence, not a disabled feature.
# The generated parser's Python surface lives in the generated file and uses
# fltk-cst-core's python-gated machinery.  This crate never links pyo3.

[dependencies]
fltk-cst-core = { path = "../fltk-cst-core", default-features = false }
# TODO(regex-automata-features): default features include dfa-build/dfa-search (full DFA
# determinizer), which regex=1 does not enable.  This adds compile time and binary size for
# every downstream consumer.  Consider pinning to the feature subset actually used by regex=1:
# default-features = false, features = ["std","syntax","perf","unicode","meta","nfa-backtrack",
# "nfa-pikevm","hybrid","dfa-onepass"].  Current default-features choice is intentional (DFA
# build is a search-time win for small patterns) but the cost was not formally weighed.
regex-automata = "0.4"
