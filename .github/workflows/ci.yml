name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # TODO(pin-ci-actions): Pin to immutable commit SHA.
      - uses: actions/checkout@v4

      # TODO(pin-ci-actions): Pin to immutable commit SHA.
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
          enable-cache: true

      # TODO(pin-ci-actions): Pin all action refs to immutable commit SHAs.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run checks
        run: make check
