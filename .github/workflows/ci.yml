name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.10"
          enable-cache: true

      # Pinned to the v1 tag SHA; Dependabot refreshes this weekly.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable

      # Deliberately uses check-ci, not check. cargo-deny (the supply-chain /
      # advisory gate) is not installed on this runner; it is enforced via the
      # local pre-commit hook instead. check-ci runs the full check-common
      # suite, which is identical to check minus cargo-deny.
      - name: Run checks
        run: make check-ci
